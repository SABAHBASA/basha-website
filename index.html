<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>باشا گارد</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:Arial;}
body {background:#0a1628; color:white; min-height:100vh;}
.header {background:#0f2038; padding:12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #1e3a5f;}
.header-left {display:flex; align-items:center; gap:10px;}
.logo {width:35px; height:35px; background:#1e3a5f; border-radius:8px;}
.site-name {font-size:16px; font-weight:bold;}
.balance {background:#1e3a5f; padding:6px 12px; border-radius:20px; display:flex; align-items:center; gap:5px; font-size:14px;}
.menu-btn {font-size:24px; background:none; border:none; color:white; cursor:pointer;}
.banner {background:linear-gradient(135deg,#1e3a5f,#2a4a70); margin:15px; padding:15px; border-radius:12px; display:flex; align-items:center; gap:10px;}
.banner img {width:60px; height:60px; border-radius:50%;}
.banner-text {font-size:13px; line-height:1.6;}
.search {margin:15px; background:#1e3a5f; border-radius:25px; padding:12px 15px; display:flex; align-items:center; gap:10px;}
.search input {background:none; border:none; outline:none; color:white; flex:1; font-size:14px;}
.grid {display:grid; grid-template-columns:repeat(3,1fr); gap:15px; padding:15px; padding-bottom:80px;}
.item {background:#1e3a5f; border-radius:15px; padding:15px 5px; text-align:center; cursor:pointer; transition:0.2s;}
.item:hover {background:#2a4a70; transform:scale(1.05);}
.item img {width:55px; height:55px; border-radius:12px; margin-bottom:8px;}
.item p {font-size:12px;}
.bottom-nav {position:fixed; bottom:0; left:0; right:0; background:#0f2038; display:flex; justify-content:space-around; padding:10px 0; border-top:1px solid #1e3a5f;}
.bottom-nav div {text-align:center; font-size:20px; cursor:pointer;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo"></div>
    <span class="site-name">باشا گارد</span>
  </div>
  <div class="balance">+ $ 0.00</div>
  <button class="menu-btn">☰</button>
</div>

<div class="banner">
  <img src="https://via.placeholder.com/60" alt="">
  <div class="banner-text">
    شحن العاب واشتراكات باقل الاسعار<br>
    دعم فني 24 ساعة<br>
    تواصل مع الادارة للاسعار الجملة
  </div>
</div>

<div class="search">
  <span>🔍</span>
  <input type="text" placeholder="ابحث عن قسم...">
</div>

<div class="grid">
  <div class="item">
    <img src="https://via.placeholder.com/55/ff4444/fff?text=رصيد" alt="">
    <p>الرصيد والإتصالات</p>
  </div>
  <div class="item">
    <img src="https://via.placeholder.com/55/9b59b6/fff?text=دردشة" alt="">
    <p>تطبيقات الدردشة</p>
  </div>
  <div class="item">
    <img src="https://via.placeholder.com/55/f39c12/fff?text=ألعاب" alt="">
    <p>الألعاب</p>
  </div>
  <div class="item">
    <img src="https://via.placeholder.com/55/25D366/fff?text=W" alt="">
    <p>الأرقام</p>
  </div>
  <div class="item">
    <img src="https://via.placeholder.com/55/E50914/fff?text=N" alt="">
    <p>المشاهدة TV</p>
  </div>
  <div class="item">
    <img src="https://via.placeholder.com/55/00bcd4/fff?text=دفع" alt="">
    <p>الدفع الإلكتروني</p>
  </div>
  <div class="item">
    <img src="https://via.placeholder.com/55/9b59b6/fff?text=توثيق" alt="">
    <p>توثيق حسابات</p>
  </div>
  <div class="item">
    <img src="https://via.placeholder.com/55/FFFC00/000?text=S" alt="">
    <p>حسابات جاهزة</p>
  </div>
  <div class="item">
    <img src="https://via.placeholder.com/55/3498db/fff?text=VPN" alt="">
    <p>مزودات الإنترنت</p>
  </div>
</div>

<div class="bottom-nav">
  <div>🔔</div>
  <div>❤️</div>
  <div>🏠</div>
  <div>📋</div>
  <div>📦</div>
</div>

</body>
</html>
